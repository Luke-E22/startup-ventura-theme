<!doctype html><html><head><meta charset="utf-8"><style>
@font-face{font-family:'Archivo';src:url('file:///Users/lukemac/startup-ventura-theme/startup-ventura/assets/fonts/archivo-latin.woff2') format('woff2');font-weight:800;font-display:block}
@font-face{font-family:'SpaceMono';src:url('file:///Users/lukemac/startup-ventura-theme/startup-ventura/assets/fonts/spacemono-700-latin.woff2') format('woff2');font-weight:700;font-display:block}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden}
.card{position:relative;width:1200px;height:630px}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
/* Scrim: overall navy tint + a bottom-weighted gradient for text legibility. */
.scrim{position:absolute;inset:0;background:
  radial-gradient(ellipse 60% 55% at 50% 40%, rgba(16,30,40,.62), rgba(16,30,40,0) 70%),
  linear-gradient(180deg, rgba(16,30,40,.34) 0%, rgba(16,30,40,.28) 42%, rgba(16,30,40,.82) 100%)}
.wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 60px}
.logo{width:640px;max-width:74%;filter:drop-shadow(0 4px 18px rgba(0,0,0,.45))}
.wave{margin:26px 0 22px}
.tag{font-family:'Archivo',sans-serif;font-weight:800;letter-spacing:-.01em;font-size:60px;line-height:1.05;color:#fff;text-shadow:0 2px 14px rgba(0,0,0,.5)}
.tag .coral{color:#FF8A6E}
.eyebrow{position:absolute;left:0;right:0;bottom:34px;text-align:center;font-family:'SpaceMono',monospace;font-weight:700;font-size:17px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.82);text-shadow:0 1px 8px rgba(0,0,0,.5)}
</style></head><body>
<div class="card">
  <img class="bg" src="file:///Users/lukemac/startup-ventura-theme/startup-ventura/assets/img/ventura-pier.jpg">
  <div class="scrim"></div>
  <div class="wrap">
    <img class="logo" src="file:///Users/lukemac/startup-ventura-theme/startup-ventura/assets/img/logo-white-notag.png">
    <svg class="wave" width="120" height="14" viewBox="0 0 120 14" fill="none"><path d="M2 8 C 20 -2, 40 16, 60 8 S 100 -2, 118 8" stroke="#EA5A3D" stroke-width="4" stroke-linecap="round"/></svg>
    <div class="tag">Great founders grow up <span class="coral">here.</span></div>
  </div>
  <div class="eyebrow">Ventura County &nbsp;&middot;&nbsp; A 501(c)(3) Startup Accelerator</div>
</div>
</body></html>
