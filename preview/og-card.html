<!doctype html>
<!--
  Source for the Open Graph / social share image (assets/img/og/og-default.jpg).
  Rendered to 1200x630 with Playwright. To regenerate: node preview/og-gen.mjs
-->
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  @font-face {
    font-family: 'Archivo';
    src: url('file:///Users/lukemac/startup-ventura-theme/startup-ventura/assets/fonts/archivo-latin.woff2') format('woff2');
    font-weight: 800;
    font-display: block;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  .card { position: relative; width: 1200px; height: 630px; overflow: hidden; font-family: 'Archivo', system-ui, sans-serif; }
  .bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center 52%; }
  .scrim { position: absolute; inset: 0; background:
      linear-gradient(180deg, rgba(22,36,46,.55) 0%, rgba(22,36,46,.30) 38%, rgba(22,36,46,.78) 78%, rgba(22,36,46,.92) 100%); }
  .content { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px; text-align: center; padding: 0 90px; }
  .logo { width: 560px; height: auto; filter: drop-shadow(0 6px 26px rgba(0,0,0,.45)); }
  .rule { width: 96px; height: 14px; opacity: .95; }
  .tagline { font-weight: 800; font-size: 56px; line-height: 1.04; letter-spacing: -.02em; color: #fff; text-shadow: 0 2px 20px rgba(0,0,0,.5); }
  .tagline .coral { color: #FF8A80; }
</style>
</head>
<body>
  <div class="card">
    <img class="bg" src="file:///Users/lukemac/startup-ventura-theme/startup-ventura/assets/img/hero.jpg" alt="">
    <div class="scrim"></div>
    <div class="content">
      <img class="logo" src="file:///Users/lukemac/startup-ventura-theme/startup-ventura/assets/img/logo-white.png" alt="">
      <svg class="rule" viewBox="0 0 64 10" fill="none" aria-hidden="true"><path d="M1 5C9 1 15 9 23 5C31 1 37 9 45 5C53 1 59 9 63 5" stroke="#FF8A80" stroke-width="2.4" stroke-linecap="round"/></svg>
      <div class="tagline">Great founders grow up <span class="coral">here.</span></div>
    </div>
  </div>
</body>
</html>
