# Netlify configuration for the Startup Ventura static marketing site.
#
# Netlify cannot run the WordPress/PHP theme, so it serves a self-contained
# static build. build-dist.mjs regenerates the pages, bundles the theme's
# assets, and outputs dist/ with the homepage at /.

[build]
  command = "node preview/build-dist.mjs"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Pretty route for the unlisted 83 Palm concept page (flat file convention).
[[redirects]]
  from = "/explore/83-palm"
  to = "/explore-83-palm.html"
  status = 200
