  <style>
    html { scroll-behavior: smooth; }
    body { background: #F7FAFC; }
    .tnum { font-variant-numeric: tabular-nums; }
    .eyebrow { letter-spacing: 0.07em; }

    /* --- Sliders: 6px Cement track, Azul fill (set inline), 16px white/Azul thumb --- */
    input[type=range].sv { -webkit-appearance: none; appearance: none; width: 100%; height: 6px;
      border-radius: 999px; background: #E4E3E0; outline: none; cursor: pointer; }
    input[type=range].sv::-webkit-slider-thumb { -webkit-appearance: none; appearance: none;
      width: 16px; height: 16px; border-radius: 50%; background: #fff; border: 2px solid #1E6499;
      box-shadow: 0 1px 4px rgba(32,56,72,.22); margin-top: -5px; }
    input[type=range].sv::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%;
      background: #fff; border: 2px solid #1E6499; box-shadow: 0 1px 4px rgba(32,56,72,.22); }

    /* --- Mini sliders (assumptions grid): 4px track, Sky fill, 12px thumb --- */
    input[type=range].sv-mini { -webkit-appearance: none; appearance: none; width: 100%; height: 4px;
      border-radius: 999px; background: #E4E3E0; outline: none; cursor: pointer; }
    input[type=range].sv-mini::-webkit-slider-thumb { -webkit-appearance: none; appearance: none;
      width: 12px; height: 12px; border-radius: 50%; background: #fff; border: 2px solid #6BB1D8;
      box-shadow: 0 1px 3px rgba(32,56,72,.2); margin-top: -4px; }
    input[type=range].sv-mini::-moz-range-thumb { width: 12px; height: 12px; border-radius: 50%;
      background: #fff; border: 2px solid #6BB1D8; box-shadow: 0 1px 3px rgba(32,56,72,.2); }

    /* Gentle drift for the wave seam — kept out of the data zone (header/footer only) */
    @keyframes svDrift { 0% { transform: translateX(0); } 100% { transform: translateX(-18px); } }
    .wave-drift { animation: svDrift 13s ease-in-out infinite alternate; }
    @media (prefers-reduced-motion: reduce) { .wave-drift { animation: none; } }
  </style>

  <!-- ================================================================
       MODEL  ——  PURE FUNCTIONS ONLY.  No React, no DOM, no globals
       mutated.  A non-developer can read, audit, and tweak every
       formula here without touching any UI code below.

       Everything is exposed on window.SV  (SV.model, SV.fmt, SV.DEFAULTS,
       SV.PRESETS, SV.COLORS).  Rates are passed to model functions as
       FRACTIONS (0.20 = 20%); the UI stores percentages and converts at
       the boundary (see buildScenario()).
       ================================================================ -->
  <script>
  (function () {
    "use strict";

    // ---- chart / metric palette — the SV blue ladder (edit to re-skin) ----
    //   Chart series stay on Azul / Sky / Wave; Navy is axes/ticks/ink only;
    //   coral is reserved for the Give action and never appears in a chart.
    const COLORS = {
      cash:      "#1E6499", // azul  — incubator cash balance
      revenue:   "#6BB1D8", // sky   — total annual revenue line
      opex:      "#5A7180", // muted — operating-expense reference (dashed)
      donor:     "#1E6499", // azul  — revenue source: donor
      fees:      "#6BB1D8", // sky   — revenue source: management fees
      carry:     "#3F83A9", // wave  — revenue source: carry (back-loaded)
      jobs:      "#3F83A9", // wave  — jobs over time
      jobsAlt:   "#6BB1D8", // sky   — direct jobs when indirect is shown
      startupRev:"#1E6499", // azul  — startup revenue run-rate
      grid:      "#EDF2F6", // gridlines
      axis:      "#5A7180", // ticks / axis text
      end:       "#C23B3B", // danger — "program ends" marker (alert, not coral)
    };

    // =====================================================================
    // STARTUP GROWTH CURVE — successful startups are high-growth: a winner ramps
    // from 0 to its baseline over `rampYears`, then COMPOUNDS at `g`/yr, capped at
    // `maxScale`x its baseline so it plateaus (an S-curve, not unbounded growth to
    // infinity). Returns the size multiple at age `a` years after graduating.
    //   g = 0  ->  reproduces the old ramp-then-flat behavior (factor maxes at 1).
    // =====================================================================
    function growthFactor(a, rampYears, g, maxScale) {
      const cap = (maxScale > 0) ? maxScale : 1;
      if (rampYears > 0 && a < rampYears) return a / rampYears;        // initial ramp 0 -> 1
      const yearsGrowing = a - (rampYears > 0 ? rampYears : 0);        // years compounding past baseline
      return Math.min(cap, Math.pow(1 + (g || 0), Math.max(0, yearsGrowing)));
    }

    // =====================================================================
    // 1) FUND ECONOMICS  — the GP revenue the incubator earns from the fund.
    //    All inputs are absolute $ or FRACTIONS. Returns absolute $ amounts.
    // =====================================================================
    function computeFundEconomics(p) {
      // Blended gross multiple on invested capital:
      //   winners return `winnerMultiple`x, the rest return `lossRecovery`x.
      const grossMOIC = p.fundSuccessRate * p.winnerMultiple
                      + (1 - p.fundSuccessRate) * p.lossRecovery;

      const grossProceeds = p.fundSize * grossMOIC;          // total $ back to the fund
      const profit        = Math.max(0, grossProceeds - p.fundSize); // return capital first (1x)

      // Simple, NON-compounding preferred return / hurdle (default 0 -> 0).
      const preferred = p.fundSize * p.hurdleRate * p.avgExitYear;

      // GP carry: a % of profit above the 1x return AND above any preferred.
      // This is the back-loaded windfall that lands once, at avgExitYear.
      const carryToGP = p.carryPct * Math.max(0, profit - preferred);

      // Management fee: steady annual income while the fee period is active.
      const mgmtFeePerYear = p.mgmtFeePct * p.fundSize;

      return { grossMOIC, grossProceeds, profit, preferred, carryToGP, mgmtFeePerYear };
    }

    // =====================================================================
    // 2) SUSTAINABILITY / RUNWAY  — year-by-year cash simulation, t = 1..H.
    //    Returns the full per-year series plus runway / self-sustaining
    //    flags. The simulation is the single source of truth for survival.
    // =====================================================================
    function simulateRunway(p) {
      const H = p.maxHorizon;
      const cash = new Array(H + 1);
      // Year 0 starting cash: a one-time corpus seeds the account; a recurring
      // donor starts at $0 and is funded year by year.
      cash[0] = (p.donorMode === "one-time") ? p.donorCorpus : 0;

      const series = [];
      let endedYear = null; // first year cash dips below 0 (program insolvent)

      // FUND FAMILY — a GP typically raises a NEW fund every few years, each with
      // its own fee clock and its own carry event (standard practice). With
      // fundCadenceYears = 0 we model a single fund; otherwise a new vintage is
      // launched every `cadence` years. Fund launched at offset o charges fees in
      // years o+1..o+feePeriod and lands its carry at year o+avgExitYear.
      const cadence = p.fundCadenceYears || 0;
      const offsets = [];
      if (cadence > 0) { for (let o = 0; o < H; o += cadence) offsets.push(o); }
      else { offsets.push(0); }
      const numFunds = offsets.length;

      for (let t = 1; t <= H; t++) {
        let donorRev = 0, feeRev = 0, carryRev = 0;
        if (p.donorMode === "recurring") donorRev += p.donorAnnual;              // every year
        for (let i = 0; i < offsets.length; i++) {
          const o = offsets[i];
          if (t > o && t <= o + p.feePeriodYears) feeRev   += p.mgmtFeePerYear;  // each fund's fees while its clock runs
          if (t === o + p.avgExitYear)            carryRev += p.carryToGP;       // each fund's carry windfall
        }

        const revenue = donorRev + feeRev + carryRev;
        const net     = revenue - p.opEx;
        cash[t]       = cash[t - 1] + net;

        series.push({
          year: t,
          donor: donorRev, fees: feeRev, carry: carryRev,
          revenue: revenue, opEx: p.opEx, net: net, cash: cash[t],
        });

        if (cash[t] < 0 && endedYear === null) endedYear = t; // program ends here
      }

      const survivesFullHorizon = (endedYear === null);
      // runway = last year for which cash never went negative starting at year 1.
      // If it never goes negative, the program reaches the (capped) horizon.
      const runwayYears = survivesFullHorizon ? H : (endedYear - 1);

      // PERPETUAL recurring revenue — income that is still arriving at the end of
      // the modeled window. Donor recurring lasts forever; management fees only
      // count if the fee period spans the whole horizon, because once fees expire
      // the program is no longer self-sustaining on them. A one-time corpus is
      // not recurring at all.
      //   NOTE / DEVIATION FROM SPEC: the spec's literal self-sustaining test is
      //   "donor recurring + management fees during the fee period >= opEx". That
      //   over-counts fees that later expire, producing a "Self-sustaining" label
      //   on a program whose cash visibly declines after the fee period (e.g. the
      //   default scenario). We instead require PERPETUAL income to cover OpEx so
      //   the label can never contradict the runway chart. Flagged for review.
      const recurringDonor = (p.donorMode === "recurring") ? p.donorAnnual : 0;
      // Perpetual fee income: a fund FAMILY (cadence > 0) keeps raising funds, so
      // fees recur indefinitely — the time-average annual fee is the per-fund fee
      // times the number of overlapping fee clocks (feePeriod / cadence). A SINGLE
      // fund's fees only count as perpetual if they span the whole horizon.
      const steadyStateFees = (cadence > 0)
        ? p.mgmtFeePerYear * (p.feePeriodYears / cadence)
        : (p.feePeriodYears >= p.maxHorizon ? p.mgmtFeePerYear : 0);
      const perpetualRecurring = recurringDonor + steadyStateFees;

      // Self-sustaining: perpetual recurring income covers OpEx on its own (so cash
      // never trends down) AND the program survives the full horizon. A program
      // that only reaches the horizon on accumulated surplus or a one-time carry
      // windfall is finite-runway, not self-sustaining. Carry is then upside.
      const isSelfSustaining = (perpetualRecurring >= p.opEx) && survivesFullHorizon;

      // Impact runs over the survival window, capped at the horizon.
      const survivalYears = Math.min(runwayYears, H);

      return {
        series, endedYear, runwayYears, survivesFullHorizon,
        perpetualRecurring, isSelfSustaining, survivalYears, numFunds,
        startingCash: cash[0],
      };
    }

    // =====================================================================
    // 3) IMPACT PROJECTION  — jobs (a STOCK) and startup revenue (a FLOW
    //    run-rate) produced by the incubator's graduating cohorts over the
    //    survival window. Each surviving year graduates a cohort that ramps
    //    linearly to maturity.
    //
    //    ANTI-DOUBLE-COUNT (do not change without flagging): jobs & revenue
    //    come from the incubator's GRADUATES ONLY. The venture fund is modeled
    //    purely as the financial engine (section 1) that sustains the program;
    //    its portfolio jobs are NOT added here, or impact would be double-
    //    counted. A future "link fund to graduates" toggle would go here.
    //      LINK_FUND_TO_GRADUATES = false;  // stub, intentionally off
    // =====================================================================
    function projectImpact(p) {
      const Y_END = p.survivalYears;
      const series = [];

      // Successful startups produced per graduating cohort.
      const cohortSuccess = p.graduatesPerYear * p.startupSuccessRate;

      let cumulativeRevenue = 0; // running sum of the annual run-rate (secondary metric)

      // For each "as-of" year Y, sum the contribution of every cohort k<=Y,
      // ramped by how mature that cohort is BY year Y. This gives an honest
      // time series (jobs/run-rate grow as cohorts mature and accumulate).
      for (let Y = 1; Y <= Y_END; Y++) {
        let jobsDirect = 0, annualRevenue = 0;
        for (let k = 1; k <= Y; k++) {
          const age    = Y - k;
          const factor = growthFactor(age, p.rampYears, p.startupGrowthRate, p.startupMaxScale);
          jobsDirect    += cohortSuccess * p.jobsPerStartup    * factor;
          annualRevenue += cohortSuccess * p.revenuePerStartup * factor;
        }
        const jobsTotal = jobsDirect * p.indirectMultiplier; // indirect/induced jobs
        cumulativeRevenue += annualRevenue;
        series.push({ year: Y, jobsDirect, jobsTotal, annualRevenue, cumulativeRevenue });
      }

      // Headline values = state at the horizon (the final year of the window).
      const last = series[series.length - 1] || null;
      const headline = last ? {
        cumulativeJobsDirect:     last.jobsDirect,        // STOCK: direct headcount
        cumulativeJobsTotal:      last.jobsTotal,         // STOCK: incl. indirect
        annualStartupRevenue:     last.annualRevenue,     // FLOW: run-rate at horizon
        cumulativeStartupRevenue: last.cumulativeRevenue, // SUM of run-rate over window
      } : {
        cumulativeJobsDirect: 0, cumulativeJobsTotal: 0,
        annualStartupRevenue: 0, cumulativeStartupRevenue: 0,
      };

      return Object.assign({ series }, headline);
    }

    // =====================================================================
    // ORCHESTRATOR — runs all three engines for a fully-numeric scenario.
    // `s` already has rates as FRACTIONS (see buildScenario in the UI layer).
    // =====================================================================
    function runModel(s) {
      const fund = computeFundEconomics({
        fundSize: s.fundSize, fundSuccessRate: s.fundSuccessRate,
        winnerMultiple: s.winnerMultiple, lossRecovery: s.lossRecovery,
        hurdleRate: s.hurdleRate, avgExitYear: s.avgExitYear,
        carryPct: s.carryPct, mgmtFeePct: s.mgmtFeePct,
      });

      const run = simulateRunway({
        donorMode: s.donorMode, donorCorpus: s.donorCorpus, donorAnnual: s.donorAnnual,
        opEx: s.opEx, mgmtFeePerYear: fund.mgmtFeePerYear, feePeriodYears: s.feePeriodYears,
        carryToGP: fund.carryToGP, avgExitYear: s.avgExitYear, maxHorizon: s.maxHorizon,
        fundCadenceYears: s.fundCadenceYears,
      });

      const impact = projectImpact({
        survivalYears: run.survivalYears, graduatesPerYear: s.graduatesPerYear,
        startupSuccessRate: s.startupSuccessRate, jobsPerStartup: s.jobsPerStartup,
        revenuePerStartup: s.revenuePerStartup, rampYears: s.rampYears,
        startupGrowthRate: s.startupGrowthRate, startupMaxScale: s.startupMaxScale,
        indirectMultiplier: s.indirectMultiplier,
      });

      // GP revenue over the modeled horizon (for the "fund pays its own way"
      // card). Summed straight from the simulated per-year series so it correctly
      // aggregates ALL fund vintages' fees + carry (single fund or a family).
      const totalMgmtFees = run.series.reduce((a, r) => a + r.fees, 0);
      const totalCarry    = run.series.reduce((a, r) => a + r.carry, 0);
      const gpRevenue     = totalMgmtFees + totalCarry;

      return { fund, run, impact, gp: { totalMgmtFees, totalCarry, gpRevenue, numFunds: run.numFunds } };
    }

    // =====================================================================
    // FORMATTERS — never emit NaN / Infinity / raw floats.
    // =====================================================================
    function safe(n, fb) { return Number.isFinite(n) ? n : (fb === undefined ? 0 : fb); }
    function trim(x, d) { // toFixed then strip trailing zeros
      let s = x.toFixed(d);
      if (s.indexOf(".") >= 0) s = s.replace(/\.?0+$/, "");
      return s;
    }
    function usd(n) {
      n = safe(n);
      const sign = n < 0 ? "-" : "";
      const a = Math.abs(n);
      // Round-aware unit thresholds: promote to the next unit BEFORE the lower
      // unit would round up to "1000" (so 999,999 -> "$1M" not "$1000K", and
      // 999,999,999 -> "$1B" not "$1000M").
      if (a >= 999995000) return sign + "$" + trim(a / 1e9, 2) + "B";
      if (a >= 999500)    return sign + "$" + trim(a / 1e6, 2) + "M";
      if (a >= 1000)      return sign + "$" + trim(a / 1e3, 0) + "K";
      return sign + "$" + Math.round(a).toLocaleString("en-US");
    }
    function usdExact(n) { return "$" + Math.round(safe(n)).toLocaleString("en-US"); }
    // Headline currency rounded to the nearest $1M (e.g. $480.01M -> $480M); for
    // figures under $1M it falls back to normal formatting so precision is kept.
    function usdM(n) { n = safe(n); return (Math.abs(n) >= 1e6) ? usd(Math.round(n / 1e6) * 1e6) : usd(n); }
    function int(n) { return Math.round(safe(n)).toLocaleString("en-US"); }
    function pct(n) { return trim(safe(n), 1) + "%"; }
    function years(n) { n = Math.round(safe(n)); return n + (n === 1 ? " yr" : " yrs"); }
    function mult(n) { return trim(safe(n), 2) + "x"; }

    // =====================================================================
    // DEFAULTS (Tier-1 + Tier-2). UI percentages are whole numbers here.
    // =====================================================================
    const DEFAULTS = {
      donorMode: "recurring",
      donorAnnual: 300000, donorCorpus: 500000, opEx: 400000,
      fundSize: 10000000, fundSuccessRate: 12, graduatesPerYear: 10, startupSuccessRate: 40,
      // Tier 2 — under the hood. Fund profile calibrated to MEDIAN VC performance
      // (research-based, ~2024): ~12% winners at ~15.5x gross + 0.3x recovery on the
      // rest -> ~2.12x gross MOIC -> ~1.7x net TVPI after 2/20, the typical-fund
      // benchmark. Power-law: a few big winners, not many modest ones.
      mgmtFeePct: 2.0, carryPct: 20, feePeriodYears: 10, hurdleRate: 0,
      winnerMultiple: 15.5, lossRecovery: 0.3, avgExitYear: 7, fundCadenceYears: 3,
      jobsPerStartup: 10, revenuePerStartup: 1500000, rampYears: 3,
      // High-growth scaling: each surviving winner compounds jobs & revenue at
      // startupGrowthRate/yr, capped at startupMaxScale x its baseline.
      startupGrowthRate: 15, startupMaxScale: 5,
      indirectMultiplier: 1.0, maxHorizon: 25,
      // "Your gift" (donor view) + "your commitment" (investor view) — used by
      // the attribution heroes; do not affect the program model itself.
      giftMode: "recurring", giftAnnual: 25000, giftCorpus: 50000, commitment: 250000,
    };

    // =====================================================================
    // PRESETS — Conservative / Base / Ambitious. Each is a full slider
    // bundle (any key omitted falls back to DEFAULTS). Edit freely.
    // =====================================================================
    const PRESETS = {
      // Lean program, smaller fund, modest exits & job creation.
      Conservative: Object.assign({}, DEFAULTS, {
        // Lean but SUSTAINABLE: modest recurring donor + fund fees cover a small
        // OpEx from year 1; impact stays low via the smaller program inputs below.
        donorMode: "recurring", donorAnnual: 200000, opEx: 250000,
        fundSize: 5000000, fundSuccessRate: 9, graduatesPerYear: 6, startupSuccessRate: 25,
        // Fund: bottom-quartile/weak-but-viable VC (~1.44x gross -> ~1.15x net).
        winnerMultiple: 13, lossRecovery: 0.3, avgExitYear: 7, fundCadenceYears: 4,
        jobsPerStartup: 6, revenuePerStartup: 750000, rampYears: 4, indirectMultiplier: 1.0,
      }),
      // The spec defaults.
      Base: Object.assign({}, DEFAULTS),
      // Well-funded program, larger fund, strong exits & job creation.
      Ambitious: Object.assign({}, DEFAULTS, {
        donorMode: "recurring", donorAnnual: 500000, opEx: 450000,
        fundSize: 25000000, fundSuccessRate: 18, graduatesPerYear: 15, startupSuccessRate: 55,
        // Fund: strong top-quartile VC (~3.85x gross -> ~2.9x net); top-tier 25% carry.
        winnerMultiple: 20, lossRecovery: 0.3, avgExitYear: 8, carryPct: 25,
        jobsPerStartup: 20, revenuePerStartup: 3000000, rampYears: 3, indirectMultiplier: 1.5,
      }),
    };

    // =====================================================================
    // ATTRIBUTION — translate ONE donor gift or investor commitment into
    // impact, for the donor/investor "your impact" views. Pure functions.
    //   Approach: derive the program's UNIT ECONOMICS (what it costs to take
    //   a company through, per successful startup, per job) and apply them to
    //   the gift. This is the marginal/causal claim ("your dollars fund extra
    //   program capacity at the current cost") AND the source of the per-unit
    //   efficiency stat. Honest at the margin; clearly an at-current-efficiency
    //   linear estimate. `s` has rates as FRACTIONS.
    // =====================================================================
    function unitEconomics(s) {
      const g = s.graduatesPerYear;
      const costPerGraduate = g > 0 ? s.opEx / g : 0;                  // program $ to take ONE company through a year
      // Representative growth: the average size multiple over a startup's first
      // ~10 years (so per-job cost reflects that winners scale, not plateau).
      let scaleSum = 0;
      for (let a = 0; a < 10; a++) scaleSum += growthFactor(a, s.rampYears, s.startupGrowthRate, s.startupMaxScale);
      const avgScale = scaleSum / 10;
      const jobsPerSuccess  = s.jobsPerStartup * s.indirectMultiplier * avgScale; // jobs per successful startup incl. typical growth
      const revPerSuccess   = s.revenuePerStartup * avgScale;
      const costPerSuccess  = s.startupSuccessRate > 0 ? costPerGraduate / s.startupSuccessRate : 0; // $ per SUCCESSFUL startup
      const costPerJob      = jobsPerSuccess > 0 ? costPerSuccess / jobsPerSuccess : 0;             // $ per job (growth-adjusted)
      const revPerDollar    = costPerSuccess > 0 ? revPerSuccess / costPerSuccess : 0;             // $ local revenue per $ given
      const jobsPerDollar   = costPerJob > 0 ? 1 / costPerJob : 0;
      return { costPerGraduate, costPerSuccess, costPerJob, jobsPerSuccess, avgScale, revPerSuccess, revPerDollar, jobsPerDollar };
    }

    // What a donor gift funds, accounting for the GROWTH of the winners over the
    // window. `mode` = "recurring" (a batch funded each year for `windowYears`) or
    // "one-time" (a single batch that then grows for `windowYears`). Jobs/revenue
    // are the GROWN totals at the end of the window — consistent with the program
    // impact engine (same growth curve).
    function donorImpact(s, amount, mode, windowYears) {
      const cpg = (s.graduatesPerYear > 0) ? s.opEx / s.graduatesPerYear : 0; // program cost per company-year
      const perBatchCompanies = cpg > 0 ? amount / cpg : 0;
      const jobsPerSuccess = s.jobsPerStartup * s.indirectMultiplier;
      const W = Math.max(0, Math.round(windowYears || 0));
      let jobs = 0, revenue = 0;
      if (mode === "recurring") {
        // a fresh batch of companies is funded each year; sum their grown sizes at year W
        for (let b = 1; b <= W; b++) {
          const f = growthFactor(W - b, s.rampYears, s.startupGrowthRate, s.startupMaxScale);
          jobs    += perBatchCompanies * s.startupSuccessRate * jobsPerSuccess * f;
          revenue += perBatchCompanies * s.startupSuccessRate * s.revenuePerStartup * f;
        }
      } else {
        const f = growthFactor(W, s.rampYears, s.startupGrowthRate, s.startupMaxScale);
        jobs    = perBatchCompanies * s.startupSuccessRate * jobsPerSuccess * f;
        revenue = perBatchCompanies * s.startupSuccessRate * s.revenuePerStartup * f;
      }
      const companies    = (mode === "recurring") ? perBatchCompanies * W : perBatchCompanies;
      const totalDollars = (mode === "recurring") ? amount * W : amount;
      const costPerJob   = jobs > 0 ? totalDollars / jobs : 0;
      const revPerDollar = totalDollars > 0 ? revenue / totalDollars : 0;
      return { companies, perBatchCompanies, jobs, revenue, costPerJob, revPerDollar };
    }

    // Illustrative LP economics for a fund commitment of $C (NOT financial advice).
    function investorImpact(s, C) {
      const fund   = computeFundEconomics(s);
      const gross  = C * fund.grossMOIC;                 // gross proceeds on your capital
      const profit = Math.max(0, gross - C);
      const pref   = C * s.hurdleRate * s.avgExitYear;   // your simple preferred
      const carry  = s.carryPct * Math.max(0, profit - pref);
      const fees   = s.mgmtFeePct * C * Math.min(s.feePeriodYears, s.maxHorizon);
      const net    = gross - carry - fees;               // simple LP net (illustrative)
      const netMOIC   = C > 0 ? net / C : 0;
      const gpFromYou = carry + fees;                    // GP revenue your capital throws off to the incubator
      const u = unitEconomics(s);
      const jobsSustained = u.costPerJob > 0 ? gpFromYou / u.costPerJob : 0;
      return { C, gross, profit, carry, fees, net, netMOIC, grossMOIC: fund.grossMOIC, gpFromYou, jobsSustained };
    }

    window.SV = {
      model: { computeFundEconomics, simulateRunway, projectImpact, runModel, unitEconomics, donorImpact, investorImpact },
      fmt: { usd, usdExact, usdM, int, pct, years, mult, safe },
      COLORS, DEFAULTS, PRESETS,
    };
  })();
  </script>

  <script type="text/babel" data-presets="react">
  const { useState, useMemo, useCallback, useRef, useEffect } = React;
  const {
    ResponsiveContainer, ComposedChart, BarChart, Line, Bar, Area,
    XAxis, YAxis, CartesianGrid, Tooltip, ReferenceLine,
  } = Recharts;
  const { fmt, COLORS, DEFAULTS, PRESETS } = window.SV;

  // ============================================================
  // INVESTOR ACCESS GATE (soft, client-side). The key lives in this file, so it
  // keeps casual visitors out of the financial projections but is NOT real
  // security — anyone who views source can find it. For true protection, gate
  // server-side. Change INVESTOR_KEY to rotate access; set INVESTOR_CONTACT to
  // the inbox that should receive access requests.
  // ============================================================
  const INVESTOR_KEY = "ScaleVentura"; // case-insensitive (compared lowercased)
  const INVESTOR_CONTACT = "ir@startupventura.com";
  // Wired for the Startup Ventura site embed: Give opens the Zeffy donation page
  // in a new tab; investor "connect" opens the site contact page in the top window.
  const GIVE_URL = "https://www.zeffy.com/en-US/donation-form/donate-to-startup-ventura";
  const CONNECT_URL = "/contact/";

  function LockIcon({ size = 14, className = "" }) {
    return (
      <svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2.2"
        strokeLinecap="round" strokeLinejoin="round" className={className} aria-hidden="true">
        <rect x="4.5" y="10.5" width="15" height="10" rx="2" />
        <path d="M8 10.5V7a4 4 0 0 1 8 0v3.5" />
      </svg>
    );
  }

  // Convert the UI scenario (percentages as whole numbers) into the
  // fraction-based scenario the pure model expects.
  function buildScenario(ui) {
    return Object.assign({}, ui, {
      fundSuccessRate:    ui.fundSuccessRate / 100,
      startupSuccessRate: ui.startupSuccessRate / 100,
      mgmtFeePct:         ui.mgmtFeePct / 100,
      carryPct:           ui.carryPct / 100,
      hurdleRate:         ui.hurdleRate / 100,
      startupGrowthRate:  ui.startupGrowthRate / 100,
      // winnerMultiple, lossRecovery, indirectMultiplier are already x-multiples
    });
  }

  const pctOf = (v, min, max) => Math.max(0, Math.min(100, ((v - min) / (max - min)) * 100));

  // Prevent the mouse wheel from accidentally nudging a focused slider while the
  // user scrolls the control panel (a native range-input gotcha).
  function useNoWheel(ref) {
    useEffect(() => {
      const el = ref.current;
      if (!el) return;
      const onWheel = (e) => { if (document.activeElement === el) { e.preventDefault(); el.blur(); } };
      el.addEventListener("wheel", onWheel, { passive: false });
      return () => el.removeEventListener("wheel", onWheel);
    }, []);
  }

  // ======================= BRAND ASSETS (inline SVG) =======================
  // Four-band wave mark (light -> dark Sky->Navy). Reused for the brand mark.
  function WaveMark({ size = 38 }) {
    return (
      <svg viewBox="0 0 34 34" width={size} height={size} fill="none" style={{ flex: "none" }} aria-hidden="true">
        <path d="M2,10 Q9.5,5 17,10 T32,10" stroke="#6BB1D8" strokeWidth="2.6" strokeLinecap="round" />
        <path d="M2,16 Q9.5,11 17,16 T32,16" stroke="#3F83A9" strokeWidth="2.6" strokeLinecap="round" />
        <path d="M2,22 Q9.5,17 17,22 T32,22" stroke="#1E6499" strokeWidth="2.6" strokeLinecap="round" />
        <path d="M2,28 Q9.5,23 17,28 T32,28" stroke="#203848" strokeWidth="2.6" strokeLinecap="round" />
      </svg>
    );
  }

  // Full-width four-band wave seam. `flip` mirrors it vertically for the footer.
  function WaveSeam({ flip = false }) {
    return (
      <svg viewBox="0 0 1440 60" preserveAspectRatio="none" width="100%" height="100%" fill="none"
        className="wave-drift" style={{ display: "block", transform: flip ? "scaleY(-1)" : "none" }} aria-hidden="true">
        <path d="M-80,40 C 220,18 460,52 700,34 C 940,16 1180,50 1520,32 L1520,60 L-80,60 Z" fill="#EAF3F8" />
        <path d="M-80,44 C 220,26 460,56 700,40 C 940,24 1180,54 1520,38 L1520,60 L-80,60 Z" fill="#6BB1D8" />
        <path d="M-80,48 C 220,32 460,59 700,46 C 940,32 1180,57 1520,44 L1520,60 L-80,60 Z" fill="#3F83A9" />
        <path d="M-80,52 C 220,38 460,60 700,52 C 940,38 1180,60 1520,50 L1520,60 L-80,60 Z" fill="#1E6499" />
      </svg>
    );
  }

  // Small 3-person glyph for the Jobs card (the human cue).
  function PeopleGlyph() {
    return (
      <svg width="34" height="16" viewBox="0 0 34 16" fill="none" style={{ flex: "none" }} aria-hidden="true">
        <circle cx="6" cy="5" r="3" fill="#6BB1D8" /><path d="M1,15 a5,5 0 0 1 10,0 Z" fill="#6BB1D8" />
        <circle cx="17" cy="4.5" r="3.3" fill="#3F83A9" /><path d="M11,15 a6,6 0 0 1 12,0 Z" fill="#3F83A9" />
        <circle cx="28" cy="5" r="3" fill="#6BB1D8" /><path d="M23,15 a5,5 0 0 1 10,0 Z" fill="#6BB1D8" />
      </svg>
    );
  }

  // Two-tone wordmark: Startup (navy) + Ventura (azul), no space between.
  function Wordmark({ className = "" }) {
    return (
      <span className={"font-bold tracking-[-0.01em] " + className}>
        <span className="text-navy">Startup</span><span className="text-azul">Ventura</span>
      </span>
    );
  }

  // ======================= REUSABLE CONTROLS =======================
  const Eyebrow = ({ children, className = "" }) => (
    <div className={"font-mono uppercase eyebrow text-muted " + className}>{children}</div>
  );

  // Segmented control. variant "scenario" = white container/azul-fill active;
  // variant "toggle" = paper track/white-pill active (donor mode).
  function Segmented({ options, value, onChange, variant = "scenario" }) {
    const wrap = variant === "toggle"
      ? "inline-flex w-full bg-paper border border-hair rounded-[9px] p-[3px] gap-1"
      : "inline-flex bg-white border border-hair rounded-[11px] p-[3px] gap-1";
    return (
      <div className={wrap}>
        {options.map((o) => {
          const active = value === o.val;
          const base = variant === "toggle"
            ? "flex-1 px-3 py-[7px] rounded-[6px] text-[12.5px] transition text-center "
            : "px-3.5 py-[7px] rounded-[8px] text-[13px] transition ";
          const state = active
            ? (variant === "toggle"
                ? "bg-white text-azul font-bold shadow-sm"
                : "bg-azul text-white font-bold shadow-sm")
            : "text-muted font-medium hover:text-navy";
          return (
            <button key={o.val} type="button" onClick={() => onChange(o.val)} className={base + state}>
              {o.label}
            </button>
          );
        })}
      </div>
    );
  }

  // Group header: mono letter badge + mono uppercase label + hairline rule.
  function GroupHeader({ badge, children }) {
    return (
      <div className="flex items-center gap-2.5 mb-3.5">
        <span className="font-mono font-bold text-azul text-[12px] leading-none w-[18px] h-[18px] flex items-center justify-center rounded bg-skypale">{badge}</span>
        <Eyebrow className="text-[11px]">{children}</Eyebrow>
        <span className="flex-1 h-px bg-hair" />
      </div>
    );
  }

  // Full slider: label (left) + mono Azul value (right) over Cement/Azul track.
  function Slider({ label, value, min, max, step, onChange, format, unit, hint }) {
    const ref = useRef(null);
    useNoWheel(ref);
    const fill = `linear-gradient(to right, #1E6499 ${pctOf(value, min, max)}%, #E4E3E0 ${pctOf(value, min, max)}%)`;
    return (
      <div className="mb-[18px]">
        <div className="flex justify-between items-baseline mb-2 gap-2">
          <label className="text-[13px] font-medium text-navy">{label}</label>
          <span className="font-mono text-[13px] font-bold text-azul tnum whitespace-nowrap">
            {format(value)}{unit && <span className="text-muted font-normal">{unit}</span>}
          </span>
        </div>
        <input ref={ref} className="sv" type="range" min={min} max={max} step={step} value={value}
          style={{ background: fill }} onChange={(e) => onChange(parseFloat(e.target.value))} />
        {hint && <p className="text-[11.5px] text-muted mt-1.5">{hint}</p>}
      </div>
    );
  }

  // Compact mini-parameter (assumptions grid): label + mono value over Sky track.
  function MiniParam({ label, value, min, max, step, onChange, format }) {
    const ref = useRef(null);
    useNoWheel(ref);
    const fill = `linear-gradient(to right, #6BB1D8 ${pctOf(value, min, max)}%, #E4E3E0 ${pctOf(value, min, max)}%)`;
    return (
      <div>
        <div className="flex justify-between items-baseline mb-1.5 gap-1">
          <span className="text-[11.5px] text-muted leading-tight">{label}</span>
          <span className="font-mono text-[11.5px] font-bold text-navy tnum whitespace-nowrap">{format(value)}</span>
        </div>
        <input ref={ref} className="sv-mini" type="range" min={min} max={max} step={step} value={value}
          style={{ background: fill }} onChange={(e) => onChange(parseFloat(e.target.value))} />
      </div>
    );
  }

  // Label-less Azul-fill slider, for the gift / commitment heroes.
  function BareSlider({ value, min, max, step, onChange }) {
    const ref = useRef(null);
    useNoWheel(ref);
    const fill = `linear-gradient(to right, #1E6499 ${pctOf(value, min, max)}%, #E4E3E0 ${pctOf(value, min, max)}%)`;
    return (
      <input ref={ref} className="sv" type="range" min={min} max={max} step={step} value={value}
        style={{ background: fill }} onChange={(e) => onChange(parseFloat(e.target.value))} />
    );
  }

  // Quick-pick amount buttons (gift / commitment tiers).
  function Tiers({ tiers, value, onChange, format }) {
    return (
      <div className="flex flex-wrap gap-2">
        {tiers.map((t) => (
          <button key={t} type="button" onClick={() => onChange(t)}
            className={"px-3 py-1.5 rounded-lg text-[12.5px] font-bold border transition " +
              (value === t ? "bg-azul text-white border-azul" : "bg-white text-navy border-hair hover:border-azul")}>
            {format(t)}
          </button>
        ))}
      </div>
    );
  }

  // One big "your impact" figure.
  function StatChip({ label, value, accent }) {
    return (
      <div className="bg-white border border-hair rounded-xl px-4 py-3">
        <div className={"font-mono font-bold text-[22px] tnum leading-none " + (accent || "text-navy")}>{value}</div>
        <div className="text-[11px] text-muted mt-1.5 leading-snug">{label}</div>
      </div>
    );
  }

  // Generic surface card.
  const cardCls = "bg-white border border-hair rounded-2xl shadow-[0_4px_16px_rgba(32,56,72,0.06)]";

  // Headline metric card (eyebrow / value / sub). `warm` + `corner` for Jobs card.
  function MetricCard({ eyebrow, value, sub, note, warm, corner }) {
    return (
      <div className={(warm ? "bg-warm border-x border-b border-hair border-t-4 border-t-cement rounded-2xl shadow-[0_4px_16px_rgba(32,56,72,0.06)]" : cardCls) + " p-5 relative flex flex-col"}>
        {corner && <div className="absolute top-4 right-4">{corner}</div>}
        <Eyebrow className="text-[10.5px]">{eyebrow}</Eyebrow>
        <div className="mt-2.5">{value}</div>
        {sub && <div className="mt-1.5 text-[12.5px] text-muted leading-snug">{sub}</div>}
        {note && <div className="mt-auto pt-2.5 text-[11px] text-muted/80 leading-snug">{note}</div>}
      </div>
    );
  }

  function Disclosure({ title, open, onToggle, children }) {
    return (
      <div className={cardCls + " overflow-hidden"}>
        <button type="button" onClick={onToggle}
          className="w-full flex items-center justify-between px-5 py-4 text-left hover:bg-paper/60 transition">
          <span className="text-[13px] font-bold text-navy">{title}</span>
          <span className="font-mono text-muted text-lg leading-none select-none">{open ? "–" : "+"}</span>
        </button>
        {open && <div className="px-5 pb-5 border-t border-hair">{children}</div>}
      </div>
    );
  }

  function ChartCard({ eyebrow, title, value, legend, caption, height = 190, empty, children }) {
    return (
      <div className={cardCls + " p-5"}>
        <div className="flex items-start justify-between gap-3 mb-2">
          <div>

            <h4 className="text-[14px] font-bold text-navy leading-tight">{title}</h4>
          </div>
          {value && <div className="font-mono font-bold text-navy text-[18px] tnum">{value}</div>}
          {legend}
        </div>
        <div style={{ height }} className="w-full">
          {empty
            ? <div className="h-full flex items-center justify-center text-[12.5px] text-muted text-center px-6">{empty}</div>
            : <ResponsiveContainer width="100%" height="100%">{children}</ResponsiveContainer>}
        </div>
        {caption && <p className="text-[11.5px] text-muted mt-2">{caption}</p>}
      </div>
    );
  }

  // Shared chart styling
  const tipStyle = { borderRadius: 10, border: "1px solid #D7E2EA", boxShadow: "0 4px 16px rgba(32,56,72,0.10)", fontSize: 12, fontFamily: "Ubuntu" };
  const tipLabel = { color: "#203848", fontWeight: 700 };
  const tick = { fontSize: 11, fill: COLORS.axis, fontFamily: "Space Mono" };
  const axisUSD = (v) => fmt.usd(v);
  const axisInt = (v) => fmt.int(v);
  const tipUSD  = (v) => fmt.usdExact(v);
  const tipInt  = (v) => fmt.int(v);
  const yearLabel = (l) => "Year " + l;

  const LegendDot = ({ color, dashed, children }) => (
    <span className="inline-flex items-center gap-1.5 text-[11px] text-muted">
      <span style={{ width: 14, height: 0, borderTop: (dashed ? "2px dashed " : "3px solid ") + color, display: "inline-block" }} />
      {children}
    </span>
  );

  // The 12 under-the-hood assumptions, rendered as the mini-parameter grid.
  const ASSUMPTIONS = [
    { key: "mgmtFeePct",        label: "GP fee",            min: 0,   max: 3,        step: 0.25,   fmt: fmt.pct },
    { key: "carryPct",          label: "Carry",             min: 0,   max: 30,       step: 1,      fmt: fmt.pct },
    { key: "feePeriodYears",    label: "Fee period",        min: 0,   max: 12,       step: 1,      fmt: fmt.years },
    { key: "hurdleRate",        label: "Hurdle",            min: 0,   max: 10,       step: 1,      fmt: fmt.pct },
    { key: "winnerMultiple",    label: "Winner multiple",   min: 1,   max: 20,       step: 0.5,    fmt: fmt.mult },
    { key: "lossRecovery",      label: "Loss recovery",     min: 0,   max: 1,        step: 0.1,    fmt: fmt.mult },
    { key: "avgExitYear",       label: "Exit year",         min: 4,   max: 12,       step: 1,      fmt: fmt.years },
    { key: "fundCadenceYears",  label: "New fund every",    min: 0,   max: 8,        step: 1,      fmt: (v) => (v <= 0 ? "Single fund" : "every " + v + " yr" + (v === 1 ? "" : "s")) },
    { key: "jobsPerStartup",    label: "Jobs / startup",    min: 0,   max: 100,      step: 1,      fmt: fmt.int },
    { key: "revenuePerStartup", label: "Revenue / startup", min: 0,   max: 50000000, step: 100000, fmt: fmt.usd },
    { key: "rampYears",         label: "Ramp years",        min: 0,   max: 6,        step: 1,      fmt: fmt.years },
    { key: "startupGrowthRate", label: "Startup growth /yr", min: 0,   max: 40,       step: 5,      fmt: fmt.pct },
    { key: "startupMaxScale",   label: "Max scale",         min: 1,   max: 10,       step: 1,      fmt: fmt.mult },
    { key: "indirectMultiplier",label: "Indirect mult.",    min: 1,   max: 2.5,      step: 0.1,    fmt: fmt.mult },
    { key: "maxHorizon",        label: "Horizon",           min: 10,  max: 40,       step: 5,      fmt: fmt.years },
  ];

  // ======================= MAIN APP =======================
  function App() {
    const [ui, setUi] = useState(Object.assign({}, DEFAULTS));
    const [showAssumptions, setShowAssumptions] = useState(false);

    const [audience, setAudience] = useState("donor"); // 'donor' | 'investor'
    const [investorUnlocked, setInvestorUnlocked] = useState(false);
    const [gateOpen, setGateOpen] = useState(false);
    const [keyInput, setKeyInput] = useState("");
    const [keyError, setKeyError] = useState(false);
    const [showReqForm, setShowReqForm] = useState(false);
    const [req, setReq] = useState({ name: "", email: "", firm: "", msg: "" });

    // Investor mode is gated: selecting it opens the access gate unless unlocked.
    const chooseAudience = (val) => {
      if (val === "investor" && !investorUnlocked) { setGateOpen(true); setKeyError(false); setShowReqForm(false); }
      else setAudience(val);
    };
    const tryUnlock = () => {
      if (keyInput.trim().toLowerCase() === INVESTOR_KEY.toLowerCase()) {
        setInvestorUnlocked(true); setAudience("investor"); setGateOpen(false); setKeyInput(""); setKeyError(false);
      } else setKeyError(true);
    };
    const reqMailto = "mailto:" + INVESTOR_CONTACT
      + "?subject=" + encodeURIComponent("Investor access request — Startup Ventura Impact Calculator")
      + "&body=" + encodeURIComponent("Name: " + req.name + "\nEmail: " + req.email + "\nFirm / role: " + req.firm + "\n\n" + (req.msg || "I'd like access to the investor projections."));

    const set = useCallback((key, val) => {
      setUi((prev) => Object.assign({}, prev, { [key]: val }));
      setActivePreset(null); // a program/assumption edit no longer matches a preset
    }, []);
    // Gift/commitment is the user's OWN input, separate from the program scenario,
    // so changing it must NOT clear the selected scenario highlight.
    const setGift = useCallback((key, val) => {
      setUi((prev) => Object.assign({}, prev, { [key]: val }));
    }, []);

    const applyPreset = useCallback((name) => {
      setUi(Object.assign({}, PRESETS[name]));
      setActivePreset(name);
    }, []);

    const reset = useCallback(() => {
      setUi(Object.assign({}, DEFAULTS));
      setActivePreset("Base");
      setShowAssumptions(false);
    }, []);

    // Run the whole model on every change. Cheap (<= ~1600 ops); memoized.
    const out = useMemo(() => window.SV.model.runModel(buildScenario(ui)), [ui]);
    const { run, impact, gp, fund } = out;
    const hasIndirect = ui.indirectMultiplier > 1;
    // The impact window: jobs/revenue are measured over the survival window
    // (capped at the horizon). N is the final modeled year of that window.
    const N = run.survivalYears;
    const overYrs = N + (N === 1 ? " yr" : " yrs");

    // ---- attribution: "your gift" (donor) and "your commitment" (investor) ----
    const sFrac = buildScenario(ui);
    const giftRecurring = ui.giftMode === "recurring";
    const giftAmount = giftRecurring ? ui.giftAnnual : ui.giftCorpus;
    const giftLabel = fmt.usd(giftAmount) + (giftRecurring ? "/yr" : "");
    // Recurring gifts are framed over a 10-year window (capped by survival); the
    // donor impact engine grows the winners over that window (jobs/rev are totals).
    // Both donor modes are projected over the SAME 20-year window (capped by the
    // survival horizon) so one-time and recurring cost-per-job are comparable.
    const donorWindow = Math.min(20, N);
    const recurringYears = donorWindow; // alias used in the hero labels below
    const di = window.SV.model.donorImpact(sFrac, giftAmount, ui.giftMode, donorWindow);
    const ii = window.SV.model.investorImpact(sFrac, ui.commitment);
    const fmtCompanies = (c) => (c >= 1 ? fmt.int(c) : window.SV.fmt.safe(c).toFixed(1));

    // ---- program-longevity status (drives the pill badge) ----
    const longevity = run.isSelfSustaining
      ? { dot: "bg-azul", text: "text-azul", label: "Self-sustaining", note: ui.maxHorizon + "+ yrs",
          sub: "Revenue covers the " + fmt.usd(ui.opEx) + " annual OpEx." }
      : run.survivesFullHorizon
        ? { dot: "bg-wave", text: "text-wave", label: ui.maxHorizon + "+ yrs", note: null,
            sub: "Funded through the full modeled horizon." }
        : { dot: "bg-[#C23B3B]", text: "text-[#C23B3B]", label: fmt.years(run.runwayYears), note: null,
            sub: run.runwayYears <= 0 ? "Does not survive its first year." : "Cash runs out after year " + run.runwayYears + "." };

    const metricVal = "font-mono font-bold text-navy text-[42px] leading-none tnum";
    const heroCTA = "bg-coral hover:bg-coraldk text-white text-[14px] font-bold px-6 py-[11px] rounded-[11px] shadow-[0_4px_12px_rgba(234,90,61,0.28)] transition";

    // ---- the conversion hero: "your gift" (donor) / "your commitment" (investor) ----
    const hero = audience === "donor" ? (
      <div className={cardCls + " p-6"}>
        <Eyebrow className="text-[10.5px] mb-3">Your impact</Eyebrow>
        <div className="flex flex-col lg:flex-row gap-7">
          {/* gift control */}
          <div className="lg:w-[300px] lg:flex-none">
            <div className="mb-3">
              <Segmented variant="toggle"
                options={[{ val: "recurring", label: "Recurring" }, { val: "one-time", label: "One-time" }]}
                value={ui.giftMode} onChange={(v) => setGift("giftMode", v)} />
            </div>
            <div className="font-mono font-bold text-navy text-[34px] leading-none tnum">
              {fmt.usd(giftAmount)}<span className="text-[16px] text-muted font-normal">{giftRecurring ? " / yr" : ""}</span>
            </div>
            <div className="mt-3">
              <BareSlider value={giftAmount} min={0} max={giftRecurring ? 200000 : 1000000} step={giftRecurring ? 1000 : 5000}
                onChange={(v) => setGift(giftRecurring ? "giftAnnual" : "giftCorpus", v)} />
            </div>
            <div className="mt-3">
              <Tiers tiers={giftRecurring ? [5000, 15000, 50000, 100000] : [10000, 50000, 250000, 1000000]}
                value={giftAmount} onChange={(v) => setGift(giftRecurring ? "giftAnnual" : "giftCorpus", v)} format={fmt.usd} />
            </div>
          </div>
          {/* impact */}
          <div className="flex-1 min-w-0">
            <p className="text-[17px] text-navy leading-relaxed">
              {giftRecurring
                ? <span>Over {recurringYears} years, your <b className="text-azul">{fmt.usd(giftAmount)}/yr</b> gift funds about <b>{fmtCompanies(di.companies)}</b> companies — and as the winners scale, creates roughly <b className="text-azul">{fmt.int(di.jobs)} jobs</b> and <b>{fmt.usd(di.revenue)}/yr</b> in local startup revenue by year {recurringYears}.</span>
                : <span>Your <b className="text-azul">{fmt.usd(giftAmount)}</b> gift funds about <b>{fmtCompanies(di.companies)}</b> companies — and as the winners scale over {donorWindow} years, that grows to roughly <b className="text-azul">{fmt.int(di.jobs)} jobs</b> and <b>{fmt.usd(di.revenue)}/yr</b> in local startup revenue.</span>}
            </p>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-5">
              {giftRecurring ? (
                <React.Fragment>
                  <StatChip label={"Jobs created · " + recurringYears + " yrs"} value={fmt.int(di.jobs)} accent="text-wave" />
                  <StatChip label={"Companies · " + recurringYears + " yrs"} value={fmtCompanies(di.companies)} accent="text-azul" />
                  <StatChip label={"Local revenue / yr by yr " + recurringYears} value={fmt.usd(di.revenue)} />
                  <StatChip label="Cost per job" value={fmt.usd(di.costPerJob)} />
                </React.Fragment>
              ) : (
                <React.Fragment>
                  <StatChip label="Companies funded" value={fmtCompanies(di.companies)} accent="text-azul" />
                  <StatChip label={"Jobs created · " + donorWindow + " yrs"} value={fmt.int(di.jobs)} accent="text-wave" />
                  <StatChip label="Local revenue / yr" value={fmt.usd(di.revenue)} />
                  <StatChip label="Cost per job" value={fmt.usd(di.costPerJob)} />
                </React.Fragment>
              )}
            </div>
            <div className="mt-5 flex flex-wrap items-center gap-4">
              <a href={GIVE_URL} target="_blank" rel="noopener noreferrer" className={heroCTA}>Give {giftLabel}</a>
              <span className="text-[12px] text-muted">≈ {fmt.usd(di.costPerJob)} per job · every $1 → {fmt.usd(di.revPerDollar)} local revenue/yr · helps the program reach <b className="text-navy">{run.isSelfSustaining ? "self-sustaining" : fmt.years(run.survivalYears)}</b></span>
            </div>
          </div>
        </div>
      </div>
    ) : (
      <div className={cardCls + " p-6"}>
        <Eyebrow className="text-[10.5px] mb-3">Your commitment</Eyebrow>
        <div className="flex flex-col lg:flex-row gap-7">
          {/* commitment control */}
          <div className="lg:w-[300px] lg:flex-none">
            <div className="font-mono font-bold text-navy text-[34px] leading-none tnum">{fmt.usd(ui.commitment)}</div>
            <div className="mt-3">
              <BareSlider value={ui.commitment} min={0} max={10000000} step={50000} onChange={(v) => setGift("commitment", v)} />
            </div>
            <div className="mt-3">
              <Tiers tiers={[100000, 250000, 1000000, 5000000]} value={ui.commitment} onChange={(v) => setGift("commitment", v)} format={fmt.usd} />
            </div>
          </div>
          {/* return + impact */}
          <div className="flex-1 min-w-0">
            <p className="text-[17px] text-navy leading-relaxed">
              A <b className="text-azul">{fmt.usd(ii.C)}</b> commitment is projected to return about <b className="text-azul">{fmt.usd(ii.net)}</b> ({fmt.mult(ii.netMOIC)} net) — and the <b>{fmt.usd(ii.gpFromYou)}</b> it generates for the incubator helps fund roughly <b className="text-wave">{fmt.int(ii.jobsSustained)} jobs</b>.
            </p>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-5">
              <StatChip label="Gross MOIC" value={fmt.mult(ii.grossMOIC)} accent="text-azul" />
              <StatChip label="Net to you (after fees + carry)" value={fmt.usd(ii.net)} />

            </div>
            <div className="mt-5 flex flex-wrap items-center gap-4">
              <a href={CONNECT_URL} target="_top" className={heroCTA}>Talk to our team</a>

    return (
      <div className="max-w-[1440px] mx-auto bg-paper min-h-screen">

        {/* ===================== HEADER ===================== */}
        <header className="relative px-9 pt-[26px] pb-[56px]"
          style={{ background: "linear-gradient(180deg,#EAF3F8 0%,#F4F9FC 70%,#FFFFFF 100%)" }}>
          <div className="flex flex-col lg:flex-row lg:items-start lg:justify-between gap-6">
            {/* Brand + title */}
            <div className="flex flex-col gap-3 items-start">
              <img src={window.SV_LOGO} alt="Startup Ventura" className="h-[60px] w-auto" />
              <div>
                <h1 className="text-[30px] font-bold text-navy tracking-[-0.02em] leading-[1.05] mt-0.5">Impact Calculator</h1>
                <p className="text-[15px] text-muted mt-1.5 max-w-[420px] leading-snug">
                  See what your support builds in Ventura County — program longevity, jobs, and startup revenue.
                </p>
              </div>
            </div>
            {/* Controls */}
            <div className="flex items-end gap-4 flex-wrap">
              <div>
                <Eyebrow className="text-[10px] mb-1.5">I am a</Eyebrow>
                <div className="inline-flex bg-white border border-hair rounded-xl p-1 gap-1">
                  <button type="button" onClick={() => chooseAudience("donor")}
                    className={"px-6 py-2.5 rounded-lg text-[15px] font-bold transition " + (audience === "donor" ? "bg-azul text-white shadow-sm" : "text-muted hover:text-navy")}>
                    Donor
                  </button>
                  <button type="button" onClick={() => chooseAudience("investor")}
                    className={"px-6 py-2.5 rounded-lg text-[15px] font-bold transition inline-flex items-center gap-1.5 " + (audience === "investor" ? "bg-azul text-white shadow-sm" : "text-muted hover:text-navy")}>
                    {!investorUnlocked && <LockIcon />}
                    Investor
                  </button>
                </div>
              </div>
              <div>
                <Eyebrow className="text-[10px] mb-1.5">Scenario</Eyebrow>
                <Segmented
                  options={[{ val: "Conservative", label: "Conservative" }, { val: "Base", label: "Expected" }, { val: "Ambitious", label: "Ambitious" }]}
                  value={activePreset} onChange={applyPreset} variant="scenario" />
              </div>
              <button type="button" onClick={reset}
                className="text-[13px] font-medium text-muted hover:text-navy transition pb-2.5">Reset</button>
              {/* GIVE / INVEST — the single coral action. Wire href to the give/contact flow. */}
              <a href={audience === "investor" ? CONNECT_URL : GIVE_URL}
                target={audience === "investor" ? "_top" : "_blank"} rel="noopener noreferrer"
                className="bg-coral hover:bg-coraldk text-white text-[14px] font-bold px-6 py-[11px] rounded-[11px] shadow-[0_4px_12px_rgba(234,90,61,0.28)] transition">
                {audience === "investor" ? "Invest" : "Give"}
              </a>
            </div>
          </div>
          {/* wave seam along the bottom edge */}
          <div className="absolute left-0 right-0 bottom-0 h-7 overflow-hidden"><WaveSeam /></div>
        </header>

        {/* ===================== BODY ===================== */}
        <div className="px-9 pt-7 pb-10">

          {/* -------- RESULTS (full width) -------- */}
          <main className="flex flex-col gap-6">

            {/* Conversion hero — your gift / your commitment -> impact */}
            {hero}

            {/* Full program projection (the model behind the numbers) */}
            <div className="flex items-center gap-2.5 pt-1">
              <Eyebrow className="text-[11px]">Full program projection</Eyebrow>
              <span className="flex-1 h-px bg-hair" />
            </div>

            {/* Headline metric cards */}
            <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-[18px]">
              <MetricCard
                eyebrow="Program longevity"
                value={
                  <span className={"inline-flex items-center gap-2 bg-skypale border border-hair rounded-full pl-2.5 pr-3 py-1.5 " + longevity.text}>
                    <span className={"w-[7px] h-[7px] rounded-full " + longevity.dot} />
                    <span className="text-[13px] font-bold">{longevity.label}</span>
                    {longevity.note && <span className="font-mono text-[11px] text-muted">{longevity.note}</span>}
                  </span>
                }
                sub={longevity.sub}
              />
              <MetricCard
                warm corner={<PeopleGlyph />}
                eyebrow="Jobs created"
                value={<span className={metricVal}>{fmt.int(hasIndirect ? impact.cumulativeJobsTotal : impact.cumulativeJobsDirect)}</span>}
                sub={hasIndirect
                  ? <span><span className="font-mono font-bold text-navy">{fmt.int(impact.cumulativeJobsDirect)}</span> direct · incl. indirect jobs</span>
                  : "Direct jobs across surviving graduates."}
                note={N >= 1
                  ? ("Total headcount in place by year " + N + " (over " + overYrs + ")")
                  : "Program ends in year 1 — no cohorts graduate."}
              />
              <MetricCard
                eyebrow="Startup revenue · annual run-rate"
                value={<span className={metricVal}>{fmt.usdM(impact.annualStartupRevenue)}</span>}
                sub={N >= 1 ? ("Annual run-rate in year " + N) : "Program ends in year 1."}
                note={N >= 1
                  ? <span>Cumulative <span className="font-mono font-bold text-navy">{fmt.usdM(impact.cumulativeStartupRevenue)}</span> over {overYrs}</span>
                  : null}
              />
              <MetricCard
                eyebrow="GP revenue earned"
                value={<span className={metricVal}>{fmt.usd(gp.gpRevenue)}</span>}
                sub={<span>{gp.numFunds > 1 ? <span className="font-mono font-bold text-navy">{gp.numFunds} funds</span> : null}{gp.numFunds > 1 ? " · " : ""}<span className="font-mono font-bold text-navy">{fmt.usd(gp.totalMgmtFees)}</span> fees + <span className="font-mono font-bold text-navy">{fmt.usd(gp.totalCarry)}</span> carry</span>}
              />
            </div>

            {/* Hero runway chart */}
            <ChartCard
              eyebrow="Runway" title="Incubator cash over time" height={300}
              legend={
                <div className="flex flex-wrap gap-3 justify-end">
                  <LegendDot color={COLORS.cash}>Cash balance</LegendDot>
                  <LegendDot color={COLORS.revenue}>Total revenue</LegendDot>
                  <LegendDot color={COLORS.opex} dashed>{fmt.usd(ui.opEx)} OpEx</LegendDot>
                </div>
              }>
              <ComposedChart data={run.series} margin={{ top: 8, right: 12, left: 6, bottom: 4 }}>
                <defs>
                  <linearGradient id="cashFill" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={COLORS.cash} stopOpacity={0.18} />
                    <stop offset="100%" stopColor={COLORS.cash} stopOpacity={0.02} />
                  </linearGradient>
                </defs>
                <CartesianGrid strokeDasharray="3 3" stroke={COLORS.grid} vertical={false} />
                <XAxis dataKey="year" tick={tick} stroke={COLORS.grid} tickFormatter={(y) => "Yr " + y} />
                <YAxis tickFormatter={axisUSD} tick={tick} stroke={COLORS.grid} width={52} />
                <Tooltip contentStyle={tipStyle} labelStyle={tipLabel} formatter={tipUSD} labelFormatter={yearLabel} />
                <ReferenceLine y={0} stroke="#cbd5e1" />
                <ReferenceLine y={ui.opEx} stroke={COLORS.opex} strokeDasharray="5 4" />
                {run.endedYear && (
                  <ReferenceLine x={run.endedYear} stroke={COLORS.end} strokeWidth={2}
                    label={{ value: "Ends · Yr " + run.endedYear, position: "top", fontSize: 10, fill: COLORS.end, fontFamily: "Space Mono" }} />
                )}
                <Area type="monotone" dataKey="cash" name="Cash balance" stroke={COLORS.cash} strokeWidth={3}
                  fill="url(#cashFill)" isAnimationActive={false} />
                <Line type="monotone" dataKey="revenue" name="Total revenue" stroke={COLORS.revenue}
                  strokeWidth={2.5} dot={false} isAnimationActive={false} />
              </ComposedChart>
            </ChartCard>

            {/* 3-up charts */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-[18px]">
              {/* Revenue composition */}
              <ChartCard
                eyebrow="Revenue composition" title="Income by source"
                caption={run.numFunds > 1
                  ? ("A new fund every " + ui.fundCadenceYears + " yrs → fees stack and carry recurs (" + run.numFunds + " funds over " + ui.maxHorizon + " yrs).")
                  : ("Carry back-loads toward Year " + ui.avgExitYear + " exits.")}>
                <BarChart data={run.series} margin={{ top: 6, right: 6, left: 0, bottom: 4 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke={COLORS.grid} vertical={false} />
                  <XAxis dataKey="year" tick={tick} stroke={COLORS.grid} tickFormatter={(y) => "Y" + y} interval={4} />
                  <YAxis tickFormatter={axisUSD} tick={tick} stroke={COLORS.grid} width={44} />
                  <Tooltip contentStyle={tipStyle} labelStyle={tipLabel} formatter={tipUSD} labelFormatter={yearLabel} />
                  <Bar dataKey="donor" name="Donor" stackId="a" fill={COLORS.donor} isAnimationActive={false} />
                  <Bar dataKey="fees" name="Mgmt fees" stackId="a" fill={COLORS.fees} isAnimationActive={false} />
                  <Bar dataKey="carry" name="Carry" stackId="a" fill={COLORS.carry} isAnimationActive={false} />
                </BarChart>
              </ChartCard>

              {/* Jobs over time */}
              <ChartCard
                eyebrow="Jobs over time" title="Cumulative headcount"
                value={fmt.int(hasIndirect ? impact.cumulativeJobsTotal : impact.cumulativeJobsDirect)}
                empty={run.survivalYears < 1 ? "The program does not survive its first year." : null}>
                <ComposedChart data={impact.series} margin={{ top: 6, right: 6, left: 0, bottom: 4 }}>
                  <defs>
                    <linearGradient id="jobsFill" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor={COLORS.jobs} stopOpacity={0.18} />
                      <stop offset="100%" stopColor={COLORS.jobs} stopOpacity={0.02} />
                    </linearGradient>
                  </defs>
                  <CartesianGrid strokeDasharray="3 3" stroke={COLORS.grid} vertical={false} />
                  <XAxis dataKey="year" tick={tick} stroke={COLORS.grid} tickFormatter={(y) => "Y" + y} interval={4} />
                  <YAxis tickFormatter={axisInt} tick={tick} stroke={COLORS.grid} width={38} />
                  <Tooltip contentStyle={tipStyle} labelStyle={tipLabel} formatter={tipInt} labelFormatter={yearLabel} />
                  <Area type="monotone" dataKey={hasIndirect ? "jobsTotal" : "jobsDirect"} name="Jobs"
                    stroke={COLORS.jobs} strokeWidth={2.5} fill="url(#jobsFill)" isAnimationActive={false} />
                  {hasIndirect && (
                    <Line type="monotone" dataKey="jobsDirect" name="Direct" stroke={COLORS.jobsAlt}
                      strokeWidth={1.5} strokeDasharray="4 3" dot={false} isAnimationActive={false} />
                  )}
                </ComposedChart>
              </ChartCard>

              {/* Startup revenue over time */}
              <ChartCard
                eyebrow="Startup revenue over time" title="Annual run-rate"
                value={fmt.usd(impact.annualStartupRevenue)}
                empty={run.survivalYears < 1 ? "The program does not survive its first year." : null}>
                <ComposedChart data={impact.series} margin={{ top: 6, right: 6, left: 0, bottom: 4 }}>
                  <defs>
                    <linearGradient id="revFill" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor={COLORS.startupRev} stopOpacity={0.18} />
                      <stop offset="100%" stopColor={COLORS.startupRev} stopOpacity={0.02} />
                    </linearGradient>
                  </defs>
                  <CartesianGrid strokeDasharray="3 3" stroke={COLORS.grid} vertical={false} />
                  <XAxis dataKey="year" tick={tick} stroke={COLORS.grid} tickFormatter={(y) => "Y" + y} interval={4} />
                  <YAxis tickFormatter={axisUSD} tick={tick} stroke={COLORS.grid} width={44} />
                  <Tooltip contentStyle={tipStyle} labelStyle={tipLabel} formatter={tipUSD} labelFormatter={yearLabel} />
                  <Area type="monotone" dataKey="annualRevenue" name="Run-rate" stroke={COLORS.startupRev}
                    strokeWidth={2.5} fill="url(#revFill)" isAnimationActive={false} />
                </ComposedChart>
              </ChartCard>
            </div>

            {/* How this is calculated */}
            <Disclosure title="How this is calculated" open={showHow} onToggle={() => setShowHow((o) => !o)}>
              <div className="pt-4 text-[13px] text-muted space-y-4 leading-[1.6] max-w-[760px]">
                <p><span className="font-bold text-navy">Fund economics.</span> The fund earns a blended return: winners return your winner multiple, the rest return your loss recovery. Investors get their capital back first (1x), then a preferred return if any; the GP keeps a carry percentage of the profit above that — a one-time windfall at the average exit year. Separately, the GP earns a steady management fee (a % of fund size) every year of the fee period.</p>
                <p><span className="font-bold text-navy">Runway.</span> We simulate cash year by year. A one-time corpus seeds the account; a recurring donor adds money each year. Every year we add revenue (donor + management fees during the fee period + carry in the exit year) and subtract OpEx. The program ends the first year cash goes negative. When ongoing recurring income covers OpEx on its own — so cash never trends down — we call it self-sustaining, and carry is pure upside. Management fees count toward this only if they last the whole horizon.</p>
                <p><span className="font-bold text-navy">Impact.</span> Each surviving year graduates a cohort. The successful share (graduates × startup success rate) creates jobs and revenue, ramping linearly to maturity. Jobs is a stock — total headcount across every surviving graduate. Startup revenue headline is an annual run-rate at the horizon; cumulative sums each year's run-rate across the window.</p>
                <p className="rounded-lg bg-skypale border border-hair p-3 text-[12px] text-navy"><span className="font-bold">No double counting:</span> the venture fund is modeled only as the financial engine that keeps the program alive and produces GP revenue. Jobs and startup revenue come from the incubator's graduates only — fund-portfolio jobs are deliberately not added on top.</p>
              </div>
            </Disclosure>

            {/* Funding & assumptions — all model inputs, tucked at the bottom */}
            <Disclosure title="Funding & assumptions" open={showAssumptions} onToggle={() => setShowAssumptions((o) => !o)}>
              <div className="pt-4">
                <div className="flex items-center gap-2.5 mb-3"><Eyebrow className="text-[11px]">Program &amp; impact</Eyebrow><span className="flex-1 h-px bg-hair" /></div>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-8">
                  <Slider label="Companies graduated" value={ui.graduatesPerYear} min={0} max={50} step={1}
                    onChange={(v) => set("graduatesPerYear", v)} format={fmt.int} unit=" / yr" />
                  <Slider label="Startup success rate" value={ui.startupSuccessRate} min={0} max={100} step={1}
                    onChange={(v) => set("startupSuccessRate", v)} format={fmt.pct} hint="Share of graduates that survive / scale" />
                  <Slider label="Fund success rate" value={ui.fundSuccessRate} min={0} max={100} step={1}
                    onChange={(v) => set("fundSuccessRate", v)} format={fmt.pct} hint="Share of the portfolio that exits as winners" />
                </div>

                <div className="flex items-center gap-2.5 mb-3 mt-5"><Eyebrow className="text-[11px]">Funding engine</Eyebrow><span className="flex-1 h-px bg-hair" /></div>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-8 items-end">
                  <div className="mb-[18px]">
                    <label className="text-[13px] font-medium text-navy block mb-2">Donor funding mode</label>
                    <Segmented
                      options={[{ val: "recurring", label: "Recurring" }, { val: "one-time", label: "One-time corpus" }]}
                      value={ui.donorMode} onChange={(v) => set("donorMode", v)} variant="toggle" />
                  </div>
                  {ui.donorMode === "recurring" ? (
                    <Slider label="Donor dollars" value={ui.donorAnnual} min={0} max={2000000} step={10000}
                      onChange={(v) => set("donorAnnual", v)} format={fmt.usd} unit=" / yr" />
                  ) : (
                    <Slider label="Donor corpus (one-time)" value={ui.donorCorpus} min={0} max={5000000} step={25000}
                      onChange={(v) => set("donorCorpus", v)} format={fmt.usd} hint="One-time endowment, drawn down" />
                  )}
                  <Slider label="Annual OpEx" value={ui.opEx} min={100000} max={2000000} step={25000}
                    onChange={(v) => set("opEx", v)} format={fmt.usd} hint="Cost to run the program / yr" />
                  <Slider label="Fund size" value={ui.fundSize} min={0} max={100000000} step={500000}
                    onChange={(v) => set("fundSize", v)} format={fmt.usd} hint="Capital under management (drives fees + carry)" />
                </div>

                <div className="flex items-center gap-2.5 mb-3 mt-5"><Eyebrow className="text-[11px]">Fund terms &amp; impact</Eyebrow><span className="flex-1 h-px bg-hair" /></div>
                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-8 gap-y-3">
                  {ASSUMPTIONS.map((a) => (
                    <MiniParam key={a.key} label={a.label} value={ui[a.key]} min={a.min} max={a.max}
                      step={a.step} format={a.fmt} onChange={(v) => set(a.key, v)} />
                  ))}
                </div>
              </div>
            </Disclosure>
          </main>
        </div>

        {/* ===================== FOOTER ===================== */}
        <footer className="relative bg-white border-t border-hair mt-2">
          <div className="absolute left-0 right-0 top-0 h-6 overflow-hidden"><WaveSeam flip /></div>
          <div className="flex flex-col sm:flex-row items-center justify-between gap-3 px-9 py-7 pt-9">
            <img src={window.SV_LOGO} alt="Startup Ventura" className="h-9 w-auto" />
            <div className="flex items-center gap-2.5">
              <Eyebrow className="text-[10px]">In partnership with</Eyebrow>
              {/* Partner mark — swap "VC Ventures" for the real partner logo when available. */}
              <span className="font-mono font-bold text-[11px] text-muted border border-dashed border-hair rounded px-2.5 py-1">VC Ventures</span>
            </div>
          </div>
          <div className="px-9 pb-6 text-[11px] text-muted/80 max-w-[760px]">
            Illustrative model for donor &amp; investor planning. All figures are projections based on the assumptions above, not guarantees.
          </div>
        </footer>

        {/* ===================== INVESTOR ACCESS GATE ===================== */}
        {gateOpen && (
          <div className="fixed inset-0 z-50 flex items-center justify-center p-4"
            style={{ background: "rgba(32,56,72,0.45)", backdropFilter: "blur(2px)" }}
            onClick={() => setGateOpen(false)}>
            <div className="bg-white rounded-2xl shadow-[0_20px_60px_rgba(32,56,72,0.25)] ring-1 ring-hair max-w-md w-full p-6"
              onClick={(e) => e.stopPropagation()}>
              <div className="flex items-start justify-between gap-3">
                <div className="flex items-center gap-2.5">
                  <span className="h-9 w-9 rounded-lg bg-skypale text-azul flex items-center justify-center"><LockIcon size={18} /></span>
                  <div>
                    <h3 className="text-[17px] font-bold text-navy leading-tight">Investor access</h3>
                    <p className="text-[12px] text-muted">Financial projections are access-restricted.</p>
                  </div>
                </div>
                <button type="button" onClick={() => setGateOpen(false)} className="text-muted hover:text-navy text-2xl leading-none -mt-1">×</button>
              </div>

              {!showReqForm ? (
                <div className="mt-5">
                  <label className="text-[12px] font-medium text-navy">Access key</label>
                  <input type="text" value={keyInput} autoFocus
                    onChange={(e) => { setKeyInput(e.target.value); setKeyError(false); }}
                    onKeyDown={(e) => { if (e.key === "Enter") tryUnlock(); }}
                    placeholder="Enter your access key"
                    className={"mt-1.5 w-full rounded-lg border px-3 py-2.5 text-[14px] outline-none focus:border-azul " + (keyError ? "border-[#C23B3B]" : "border-hair")} />
                  {keyError && <p className="mt-1.5 text-[12px] text-[#C23B3B]">That key wasn't recognized. Check it, or request access below.</p>}
                  <button type="button" onClick={tryUnlock}
                    className="mt-3 w-full bg-azul hover:bg-azuldk text-white font-bold text-[14px] py-2.5 rounded-lg transition">Unlock investor view</button>
                  <button type="button" onClick={() => setShowReqForm(true)}
                    className="mt-3 w-full text-[13px] text-muted hover:text-navy transition">Don't have a key? <span className="text-azul font-semibold">Request access</span></button>
                </div>
              ) : (
                <div className="mt-5">
                  <p className="text-[13px] text-muted mb-3">Tell us a bit about you and we'll be in touch with access.</p>
                  <div className="space-y-2.5">
                    <input placeholder="Name" value={req.name} onChange={(e) => setReq(Object.assign({}, req, { name: e.target.value }))} className="w-full rounded-lg border border-hair px-3 py-2 text-[14px] outline-none focus:border-azul" />
                    <input placeholder="Email" type="email" value={req.email} onChange={(e) => setReq(Object.assign({}, req, { email: e.target.value }))} className="w-full rounded-lg border border-hair px-3 py-2 text-[14px] outline-none focus:border-azul" />
                    <input placeholder="Firm / role" value={req.firm} onChange={(e) => setReq(Object.assign({}, req, { firm: e.target.value }))} className="w-full rounded-lg border border-hair px-3 py-2 text-[14px] outline-none focus:border-azul" />
                    <textarea placeholder="Anything you'd like us to know (optional)" rows={3} value={req.msg} onChange={(e) => setReq(Object.assign({}, req, { msg: e.target.value }))} className="w-full rounded-lg border border-hair px-3 py-2 text-[14px] outline-none focus:border-azul resize-none" />
                  </div>
                  <a href={reqMailto}
                    className={"mt-3 block text-center font-bold text-[14px] py-2.5 rounded-lg transition " + ((req.name && req.email) ? "bg-coral hover:bg-coraldk text-white" : "bg-hair text-muted pointer-events-none")}>
                    Send request
                  </a>
                  <p className="mt-2 text-[11px] text-muted text-center">Opens your email to {INVESTOR_CONTACT}.</p>
                  <button type="button" onClick={() => setShowReqForm(false)} className="mt-2 w-full text-[12px] text-muted hover:text-navy">← Back to access key</button>
                </div>
              )}
            </div>
          </div>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <!-- ================================================================
       EMBED HELPER — when this file is loaded inside an <iframe>, post our
       height to the parent so the host page can auto-size the iframe (no inner
       scrollbar). Harmless when opened standalone. Parent listens for:
         window.addEventListener("message", e => { if (e.data?.type === "sv-impact-calc-height") iframe.style.height = e.data.height + "px"; });
       ================================================================ -->
  <script>
  (function () {
    function postHeight() {
      try {
        var h = document.documentElement.scrollHeight;
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: "sv-impact-calc-height", height: h }, "*");
        }
      } catch (e) {}
    }
    if (window.ResizeObserver) { try { new ResizeObserver(postHeight).observe(document.body); } catch (e) {} }
    window.addEventListener("load", postHeight);
    window.addEventListener("resize", postHeight);
    setTimeout(postHeight, 400);
    setTimeout(postHeight, 1500);
  })();
  </script>
</body>
</html>
